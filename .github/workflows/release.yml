# Builds and publishes a GitHub release when a version tag is pushed:
#   git tag v1.0.0 && git push origin v1.0.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      # The binaries are pure Go (CGO_ENABLED=0, modernc.org/sqlite), so every
      # target cross-compiles from the one Linux runner.
      - name: Build release archives
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            ext=""
            [ "$GOOS" = "windows" ] && ext=".exe"
            out="dist/${GOOS}_${GOARCH}"
            mkdir -p "$out/data"
            for cmd in bot backtest optimize; do
              GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath -ldflags "-s -w" \
                -o "$out/finance_${cmd}${ext}" "./cmd/${cmd}"
            done
            cp README.md "$out/"
            cp data/config.example.yaml "$out/data/"
            name="go_finance_bot_${VERSION}_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              (cd "$out" && zip -qr "../${name}.zip" .)
            else
              tar -czf "dist/${name}.tar.gz" -C "$out" .
            fi
            rm -rf "$out"
          done
          (cd dist && sha256sum -- * > checksums.txt)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
